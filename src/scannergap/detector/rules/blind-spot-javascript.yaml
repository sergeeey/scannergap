rules:
  # ============================================================
  # ScannerGap Custom Rules — JavaScript/TypeScript
  # Detects patterns that standard Semgrep/CodeQL rules miss
  # ============================================================

  - id: blindspot-js-new-function-tainted
    message: >
      new Function() called with a dynamically constructed string argument.
      This is equivalent to eval() but is missed by most scanners because
      they only flag eval() and Function() as standalone calls.
      Confirmed blind spot: CodeQL security-extended (104 queries) found 0 findings.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-94"
      category: security
      blindspot_type: "Type III: Non-standard sink"
      references:
        - "CVE-2024-45390 (@blakeembrey/template)"
      verified: "CodeQL 2.25.1 security-extended: 0 findings"
    patterns:
      - pattern: new Function($BODY)
      - pattern-not: new Function("...")

  - id: blindspot-js-new-function-template-literal
    message: >
      new Function() called with template literal argument. The template may
      include user-controlled expressions, enabling code injection.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-94"
      category: security
      blindspot_type: "Type III: Non-standard sink"
    pattern: new Function(`...`)

  - id: blindspot-js-child-process-template
    message: >
      Child process (exec/execSync/spawn) called with template literal
      containing user-controlled variable. Standard rules may miss this
      when the command is constructed via template literals rather than
      string concatenation.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-78"
      category: security
      blindspot_type: "Type I: Cross-function taint gap"
      references:
        - "CVE-2024-39943 (HFS)"
    pattern-either:
      - pattern: execSync(`...${$VAR}...`)
      - pattern: exec(`...${$VAR}...`, ...)
      - pattern: $CP.execSync(`...${$VAR}...`)
      - pattern: $CP.exec(`...${$VAR}...`, ...)

  - id: blindspot-js-ssrf-fetch-variable-url
    message: >
      fetch() or axios called with a URL constructed from variables.
      If the URL components come from user input, this enables SSRF.
      Standard rules may miss indirect URL construction.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-918"
      category: security
      blindspot_type: "Type I: Cross-function taint gap"
    pattern-either:
      - pattern: fetch(`...${$VAR}...`, ...)
      - pattern: axios.get(`...${$VAR}...`, ...)
      - pattern: axios.post(`...${$VAR}...`, ...)
      - pattern: axios(`...${$VAR}...`, ...)
