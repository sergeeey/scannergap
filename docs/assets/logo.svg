<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#bg)" stroke="#2a2a4a" stroke-width="2"/>
  <!-- Outer ring with gap -->
  <circle cx="60" cy="60" r="42" fill="none" stroke="url(#ring)" stroke-width="6"
          stroke-dasharray="220 44" stroke-dashoffset="-22" stroke-linecap="round"/>
  <!-- Inner shield -->
  <path d="M60 28 L82 40 L82 62 C82 78 60 92 60 92 C60 92 38 78 38 62 L38 40 Z"
        fill="url(#gap)" stroke="#e94560" stroke-width="1.5" opacity="0.9"/>
  <!-- Gap slash -->
  <line x1="45" y1="75" x2="75" y2="45" stroke="#ff6b6b" stroke-width="3"
        stroke-linecap="round" opacity="0.8"/>
  <!-- Eye / scan -->
  <ellipse cx="60" cy="58" rx="12" ry="8" fill="none" stroke="#e94560"
           stroke-width="2" opacity="0.9"/>
  <circle cx="60" cy="58" r="3" fill="#ff6b6b"/>
</svg>
