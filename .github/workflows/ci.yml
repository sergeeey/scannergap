name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/

      - name: Format check
        run: ruff format --check src/ tests/ scripts/

      - name: Run tests
        run: pytest tests/ -v --cov=blindspotsec --cov-report=term-missing

      - name: Type check
        run: mypy src/blindspotsec/ --ignore-missing-imports

  validate-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Validate detector rules
        run: semgrep scan --config src/blindspotsec/detector/rules/ --validate
